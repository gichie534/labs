# Build the Go "hello world" image, push it to ECR, register a new ECS task-definition revision
# pointing at it, roll the Fargate service, and test the public HTTPS endpoint — all keyless via
# GitHub OIDC (no long-lived AWS access keys).
#
# Required repository variables (Settings > Secrets and variables > Actions > Variables):
#   AWS_REGION        e.g. us-east-1
#   AWS_ROLE_ARN      IAM role to assume — from `task ecs-https:ci-config`
#   APP_DOMAIN        the public hostname, e.g. ecs-https.aws.richardbatyrov.com
#
# The lab-fixed names (ECR repository, ECS cluster/service, task family, container) are hardcoded
# below as constants — they're always "ecs-fargate-https" / "app" for this lab, not per-environment.
#
# Auth is DIRECT federation: the workflow assumes AWS_ROLE_ARN itself with a short-lived OIDC token,
# no access keys. The role (deployer-oidc unit) is scoped to this repo's main branch and to just
# ECR push/pull + ECS register/update on this service.
#
# SCOPE: this is the steady-state APP loop. It assumes the infrastructure, ACM certificate, and the
# DNS A record were stood up once by the operator via the Taskfile (`task ecs-https:up`). The ALB,
# cert, and DNS record persist across these deploys; CI just ships new image revisions and re-tests.
#
# This workflow lives inside the lab folder. To have GitHub run it, a copy is provided at the repo
# root as .github/workflows/deploy-ecs-fargate-https.yml.

name: deploy-ecs-fargate-https

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "aws/ecs-fargate-https/app/go/**"
      - ".github/workflows/deploy-ecs-fargate-https.yml"

permissions:
  contents: read
  id-token: write # required for GitHub to mint the OIDC token used for AWS federation

env:
  APP_DIR: aws/ecs-fargate-https/app/go

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (keyless, GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ecs-fargate-https
        run: |
          IMAGE="$REGISTRY/$REPOSITORY:${GITHUB_SHA::12}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          docker build --platform linux/amd64 -t "$IMAGE" "$APP_DIR"
          docker push "$IMAGE"

      - name: Render current task definition to a file
        run: |
          aws ecs describe-task-definition --task-definition "ecs-fargate-https" \
            --query 'taskDefinition.{family:family,taskRoleArn:taskRoleArn,executionRoleArn:executionRoleArn,networkMode:networkMode,containerDefinitions:containerDefinitions,requiresCompatibilities:requiresCompatibilities,cpu:cpu,memory:memory,runtimePlatform:runtimePlatform}' \
            > task-definition.json

      - name: Set the new image in the task definition
        id: taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS (register revision + roll service)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.taskdef.outputs.task-definition }}
          service: ecs-fargate-https
          cluster: ecs-fargate-https
          wait-for-service-stability: true

      - name: Test the public HTTPS endpoint
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
        run: |
          echo "Probing https://$APP_DOMAIN/ ..."
          for i in $(seq 1 30); do
            if curl -fsS --max-time 10 "https://$APP_DOMAIN/"; then
              echo "OK: served over HTTPS"
              exit 0
            fi
            echo "  not ready yet (attempt $i); retrying..."
            sleep 10
          done
          echo "FAILED: could not reach https://$APP_DOMAIN/ over HTTPS." >&2
          exit 1
