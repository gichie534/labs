version: '3'

# Lifecycle for the aws/ecs-fargate-https lab.
#
# A Go "hello world" HTTP server runs on ECS Fargate behind an internet-facing ALB that terminates
# TLS with an ACM certificate (HTTP :80 -> HTTPS :443 redirect). The app is reachable at
# https://$APP_DOMAIN. Real deploys run from GitHub Actions; the build/deploy/verify tasks here
# mirror that flow for local iteration.
#
# Flow:
#   1. up      -> provision infra (VPC, ECR, cluster, ACM cert, ALB, Fargate service, CI role, DNS).
#                 The service is created with a :bootstrap image that doesn't exist yet, so it has no
#                 healthy tasks until the first deploy.
#   2. deploy  -> build + push the image, register a new task-def revision pointing at it, and roll
#                 the service (this is what makes it healthy).
#   3. verify  -> GET https://$APP_DOMAIN/.
# `task ecs-https:all` runs deploy -> verify after `up`.
#
# Only `up` and `deploy` create/modify cloud resources. fmt/validate/plan are cost-free.
#
# CONFIG: lab inputs (AWS_REGION, TF_STATE_BUCKET, PARENT_ZONE_NAME, APP_DOMAIN, GITHUB_REPOSITORY)
# are loaded from a local `.env` via Task's dotenv. Copy `.env.example` to `.env` and fill it in;
# `.env` is gitignored. Because the root Taskfile includes this one, `dotenv:` is declared per-task
# (a global top-level dotenv is rejected in an included Taskfile), and tasks that `dir: infra` load
# `['../.env']` while the rest load `['.env']`.

vars:
  APP_DIR: app/go
  IMAGE_NAME: ecs-fargate-https
  CLUSTER: ecs-fargate-https
  SERVICE: ecs-fargate-https
  FAMILY: ecs-fargate-https
  CONTAINER: app

tasks:
  default:
    cmds: [task --list]
    silent: true

  init-env:
    desc: Create a local .env from the template (no-op if .env already exists, so it never clobbers your values)
    cmds:
      - |
        if [ -f .env ]; then
          echo ".env already exists — leaving it untouched."
        else
          cp .env.example .env
          echo "Created .env from .env.example — fill in your values."
        fi

  fmt:
    desc: Format Terragrunt HCL and Go
    cmds:
      - terragrunt hcl format
      - gofmt -w ./app/go

  validate:
    desc: Validate every infra unit (cost-free)
    dir: infra
    dotenv: ['../.env']
    cmds: [terragrunt run --all validate]

  lint:
    desc: Lint Terraform/Terragrunt and vet the Go app
    cmds:
      - tflint --recursive
      - go vet ./app/go/...

  plan:
    desc: Plan all infra units (cost-free)
    dir: infra
    dotenv: ['../.env']
    cmds: [terragrunt run --all plan]

  state-bootstrap:
    desc: 'Create the S3 state bucket (run once; needs TF_STATE_BUCKET + admin creds)'
    dir: infra
    dotenv: ['../.env']
    cmds:
      - terragrunt backend bootstrap --all --non-interactive

  up:
    desc: 'Provision all infra — VPC, ECR, cluster, ACM cert, ALB (HTTPS), Fargate service, CI role, DNS (creates cloud resources)'
    dir: infra
    dotenv: ['../.env']
    cmds: [terragrunt run --all apply --non-interactive]

  build:
    desc: Build the Go app image locally (linux/amd64 to match Fargate tasks)
    cmds:
      - docker build --platform linux/amd64 -t {{.IMAGE_NAME}}:{{.TAG | default "dev"}} {{.APP_DIR}}

  deploy:
    desc: Build, push to ECR, register a new task-def revision with the new image, and roll the service
    deps: [build]
    dotenv: ['.env']
    cmds:
      - |
        set -euo pipefail
        : "${AWS_REGION:?set AWS_REGION}"
        TAG="{{.TAG | default "dev"}}"

        REPO_URL="$(cd infra/registry && terragrunt output -raw repository_url)"
        REG_HOST="${REPO_URL%/*}"
        IMAGE="$REPO_URL:$TAG"

        echo "==> push $IMAGE"
        aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$REG_HOST"
        docker tag {{.IMAGE_NAME}}:"$TAG" "$IMAGE"
        docker push "$IMAGE"

        echo "==> register new task-definition revision"
        TASKDEF="$(aws ecs describe-task-definition --region "$AWS_REGION" --task-definition {{.FAMILY}} \
          --query 'taskDefinition.{family:family,taskRoleArn:taskRoleArn,executionRoleArn:executionRoleArn,networkMode:networkMode,containerDefinitions:containerDefinitions,requiresCompatibilities:requiresCompatibilities,cpu:cpu,memory:memory,runtimePlatform:runtimePlatform}')"
        NEWDEF="$(echo "$TASKDEF" | jq --arg IMG "$IMAGE" '.containerDefinitions |= map(if .name=="{{.CONTAINER}}" then .image=$IMG else . end)')"
        REV="$(aws ecs register-task-definition --region "$AWS_REGION" --cli-input-json "$NEWDEF" --query 'taskDefinition.taskDefinitionArn' --output text)"
        echo "    registered $REV"

        echo "==> update service and wait for stable"
        aws ecs update-service --region "$AWS_REGION" --cluster {{.CLUSTER}} --service {{.SERVICE}} --task-definition "$REV" >/dev/null
        aws ecs wait services-stable --region "$AWS_REGION" --cluster {{.CLUSTER}} --service {{.SERVICE}}
        echo "    service is stable on $REV"

  verify:
    desc: GET the public HTTPS endpoint
    dotenv: ['.env']
    cmds:
      - |
        set -euo pipefail
        : "${APP_DOMAIN:?set APP_DOMAIN=<the public hostname>}"
        echo "Probing https://$APP_DOMAIN/ ..."
        for i in $(seq 1 30); do
          if curl -fsS --max-time 10 "https://$APP_DOMAIN/"; then
            echo "OK: served over HTTPS"
            exit 0
          fi
          echo "  not ready yet (attempt $i); retrying..."
          sleep 10
        done
        echo "FAILED: could not reach https://$APP_DOMAIN/ over HTTPS." >&2
        exit 1

  all:
    desc: After `up`, run the full app path — deploy -> verify
    cmds:
      - task: deploy
      - task: verify

  endpoint:
    desc: Print the app URL and the ALB DNS name
    dir: infra/alb
    dotenv: ['../../.env']
    cmds:
      - |
        echo "app:  https://${APP_DOMAIN:-<APP_DOMAIN unset>}/"
        echo -n "alb:  "; terragrunt output -raw dns_name; echo

  ci-config:
    desc: Print the IAM role ARN to set as the GitHub Actions AWS_ROLE_ARN variable
    dir: infra/deployer-oidc
    dotenv: ['../../.env']
    cmds:
      - |
        echo "Set this as a GitHub Actions repository variable:"
        echo -n "AWS_ROLE_ARN="; terragrunt output -json role_arns | jq -r '.github_deployer'

  test:
    desc: Run the Go app tests; validate as a cheap infra smoke test
    cmds:
      - task: test-app
      - task: validate

  test-app:
    internal: true
    dir: app/go
    cmds: [go test ./...]

  down:
    desc: Destroy all infra
    dir: infra
    dotenv: ['../.env']
    cmds: [terragrunt run --all destroy --non-interactive]
