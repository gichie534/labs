<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>AI Image Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            margin: 1rem;
            width: 18rem;
        }

        .card-img-top {
            height: 10rem;
            object-fit: cover;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .modal-img {
            width: 100%;
        }

        #generateDescription {
            margin-top: 15px;
        }

        .title,
        .upload-btn {
            text-align: center;
        }

        .modal-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-footer .btn {
            width: auto;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col title">
                <h1 class="mt-5">AI Image Gallery</h1>
            </div>
        </div>
        <div class="row">
            <div class="col upload-btn">
                <a href="__UPLOAD_PAGE_URL__" class="btn btn-primary mt-3 mb-3">Upload New Image</a>
            </div>
        </div>
        <div id="image-gallery" class="row justify-content-center">
            <!-- Dynamically loaded images will appear here -->
        </div>
    </div>

    <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="imageModalLabel">Image Preview</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <img id="modalImg" src="" alt="Selected image preview" class="modal-img">
                </div>
                <div class="modal-footer">
                    <button id="generateDescription" type="button" class="btn btn-primary">Generate AI
                        Description</button>
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.0/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
