version: '3'

# Root Taskfile — composes labs via `includes`, namespacing each so any lab can be
# driven from the repo root (e.g. `task vpc:up`, `task eks:plan`).
#
# Add an entry whenever a new lab gains a Taskfile. Each lab lives at
# <provider>/<name>/ and exposes the standard task interface
# (fmt, validate, lint, plan, up, build, deploy, test, down).
#
# includes:
#   vpc:
#     taskfile: aws/secure-vpc/Taskfile.yml
#     dir: aws/secure-vpc
#   eks:
#     taskfile: aws/eks-cicd/Taskfile.yml
#     dir: aws/eks-cicd

includes:
  org-layout:
    taskfile: gcp/organization-layout-terragrunt/Taskfile.yml
    dir: gcp/organization-layout-terragrunt
  gke-helm:
    taskfile: gcp/gke-autopilot-helm/Taskfile.yml
    dir: gcp/gke-autopilot-helm
  gke-ingress:
    taskfile: gcp/gke-ingress-managed-cert/Taskfile.yml
    dir: gcp/gke-ingress-managed-cert
  gke-iap:
    taskfile: gcp/gke-ingress-iap/Taskfile.yml
    dir: gcp/gke-ingress-iap
  gke-wi:
    taskfile: gcp/gke-workload-identity/Taskfile.yml
    dir: gcp/gke-workload-identity
  csi:
    taskfile: gcp/gke-secret-manager-csi/Taskfile.yml
    dir: gcp/gke-secret-manager-csi
  eks-cni:
    taskfile: aws/eks-vpc-cni-ip-allocation/Taskfile.yml
    dir: aws/eks-vpc-cni-ip-allocation
  ec2-profile:
    taskfile: aws/ec2-instance-profile/Taskfile.yml
    dir: aws/ec2-instance-profile
  gke-sqs:
    taskfile: aws-gcp/gke-sqs-federation/Taskfile.yml
    dir: aws-gcp/gke-sqs-federation

tasks:
  default:
    cmds: [task --list]
    silent: true
