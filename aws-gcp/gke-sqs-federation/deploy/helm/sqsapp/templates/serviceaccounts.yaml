# The two Kubernetes service accounts the workloads run as. With OIDC web identity federation to
# AWS, each KSA's subject (system:serviceaccount:<ns>:<name>) is what the corresponding AWS IAM
# role's trust policy gates on. The IAM grant lives in Terraform (infra/federation), so these
# names/namespace MUST match infra/federation's writer_ksa / reader_ksa / k8s_namespace.
#
# No annotations are needed: GKE Workload Identity is only used here to SIGN the projected token;
# the token is consumed by AWS, not GCP, so there's no GCP IAM binding on these KSAs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.writer.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "sqsapp.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.reader.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "sqsapp.labels" . | nindent 4 }}
