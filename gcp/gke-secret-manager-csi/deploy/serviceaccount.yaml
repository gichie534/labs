# The Kubernetes service account the Deployment runs as. With direct Workload Identity Federation
# the KSA is itself the IAM principal — no iam.gke.io/gcp-service-account annotation is needed
# (that's only for the legacy GSA-impersonation pattern). The accessor IAM grant on each Secret
# Manager secret is created in infra/workload-identity, so the namespace/name here MUST match.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-reader
  namespace: csi-demo
