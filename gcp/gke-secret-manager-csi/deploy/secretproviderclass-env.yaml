# SecretProviderClass for the "env" secret. The SecretSync resource (secretsync-env.yaml) reads
# this SPC's `path` (env-secret) to populate a Kubernetes Secret, which the Deployment then
# references via valueFrom.secretKeyRef.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: csi-env-secret
  namespace: csi-demo
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/${PROJECT_ID}/secrets/csi-env-secret/versions/latest"
        path: "env-secret"
