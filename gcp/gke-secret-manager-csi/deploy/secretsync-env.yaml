# SecretSync materializes the SecretProviderClass entry as a Kubernetes Secret in csi-demo so the
# Deployment can consume it via valueFrom.secretKeyRef. The controller authenticates to Secret
# Manager as the named KSA (Workload Identity); the same KSA's IAM grant on the secret is set up
# in infra/workload-identity. sourcePath matches the SPC's `path` field.
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: csi-env-secret
  namespace: csi-demo
spec:
  serviceAccountName: secret-reader
  secretProviderClassName: csi-env-secret
  secretObject:
    type: Opaque
    data:
      - sourcePath: "env-secret"
        targetKey: "ENV_SECRET"
