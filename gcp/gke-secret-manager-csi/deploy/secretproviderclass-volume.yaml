# SecretProviderClass for the "volume" secret. The CSI driver (provider: gke, driver name
# secrets-store-gke.csi.k8s.io) materializes the secret value into a tmpfs file at the path
# defined here (vol-secret) when the volume is mounted by a pod that uses this SPC.
#
# ${PROJECT_ID} is substituted by envsubst at `task csi:deploy` time.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: csi-volume-secret
  namespace: csi-demo
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/${PROJECT_ID}/secrets/csi-volume-secret/versions/latest"
        path: "vol-secret"
