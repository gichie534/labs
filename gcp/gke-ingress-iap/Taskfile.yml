version: '3'

# Lifecycle for the gcp/gke-ingress-iap lab.
#
# Infra is Terragrunt (units under infra/, composed by dependency blocks). The app is a Go
# "hello world" server deployed to GKE Autopilot with Helm, exposed via a classic GKE Ingress
# (external Application Load Balancer) with a Google-managed TLS certificate (ManagedCertificate CRD)
# and an HTTP->HTTPS redirect, and PROTECTED BY IAP (a BackendConfig with iap.enabled: true, using
# the Google-managed OAuth client). Real deploys run from GitHub Actions; the build/deploy/dns/verify
# tasks here mirror that flow for local iteration.
#
# Two-phase HTTPS (a consequence of the ephemeral LB IP + load-balancer-authorized cert):
#   1. up      -> infra + the public child zone delegated from the parent zone (no A record yet) +
#                 the IAP access grants and test service account.
#   2. deploy  -> install the app + Ingress + ManagedCertificate + BackendConfig (LB allocates an
#                 ephemeral IP and IAP is enabled on its backend).
#   3. dns     -> read the Ingress IP and publish the apex A record (re-apply the dns unit).
#   4. verify  -> wait for the cert to go Active + DNS to resolve, then run the IAP tests:
#                   - NEGATIVE: an unauthenticated GET is redirected to Google sign-in (IAP enforces).
#                   - POSITIVE: a GET with a service-account-signed JWT (audience = the resource URL)
#                     returns 200 with the app body.
# `task gke-iap:all` runs deploy->dns->verify in order after `up`.
#
# Only `up`, `deploy`, and `dns` create/modify cloud resources. fmt/validate/plan are cost-free.
#
# CONFIG: lab inputs (GCP_PROJECT, GCP_REGION, INGRESS_DOMAIN, PARENT_DNS_*, IAP_MEMBER, etc.) are
# loaded from a local `.env` file via Task's built-in dotenv. Copy `.env.example` to `.env` and fill
# it in; `.env` is gitignored. Values exported in your shell still win, and Terragrunt's root.hcl
# picks them up through get_env(...). A missing `.env` is harmless (cost-free tasks still run).
#
# A global top-level `dotenv:` is rejected in a Taskfile that another Taskfile `include`s (the root
# labs/Taskfile.yml includes this one), so `.env` is declared per-task. NOTE the path nuance: dotenv
# resolves relative to the task's working dir, so tasks that set `dir: infra` load `['../.env']`
# (the lab root) while the rest load `['.env']`.

vars:
  APP_DIR: app/go
  CHART_DIR: deploy/helm/hello
  IMAGE_NAME: hello
  RELEASE: hello
  NAMESPACE: hello
  CLUSTER: gke-ingress-iap
  REPO: gke-ingress-iap

tasks:
  default:
    cmds: [task --list]
    silent: true

  init-env:
    desc: Create a local .env from the template (no-op if .env already exists, so it never clobbers your values)
    cmds:
      - |
        if [ -f .env ]; then
          echo ".env already exists — leaving it untouched."
        else
          cp .env.example .env
          echo "Created .env from .env.example — fill in your values."
        fi

  init-state:
    desc: Create the GCS bucket for Terraform/Terragrunt remote state (idempotent; run once before `up`)
    dotenv: ['.env']
    cmds:
      - |
        : "${GCP_PROJECT:?set GCP_PROJECT=<project id>}"
        : "${TF_STATE_BUCKET:?set TF_STATE_BUCKET=<bucket name (no gs:// prefix)>}"
        LOCATION="${GCP_REGION:-us-central1}"
        if gcloud storage buckets describe "gs://$TF_STATE_BUCKET" --project "$GCP_PROJECT" >/dev/null 2>&1; then
          echo "Bucket gs://$TF_STATE_BUCKET already exists — nothing to do."
        else
          echo "Creating gs://$TF_STATE_BUCKET in $LOCATION..."
          gcloud storage buckets create "gs://$TF_STATE_BUCKET" \
            --project "$GCP_PROJECT" \
            --location "$LOCATION" \
            --uniform-bucket-level-access \
            --public-access-prevention
        fi
        # Versioning protects state against accidental corruption/overwrite.
        gcloud storage buckets update "gs://$TF_STATE_BUCKET" --versioning

  fmt:
    desc: Format Terragrunt HCL and Go
    cmds:
      - terragrunt hcl format
      - gofmt -w ./app/go

  validate:
    desc: Validate every infra unit (cost-free)
    dir: infra
    dotenv: ['../.env']
    cmds: [terragrunt run --all validate]

  lint:
    desc: Lint Terraform/Terragrunt and the Helm chart
    cmds:
      - tflint --recursive
      - helm lint {{.CHART_DIR}} --set domain=placeholder.example.com --set image.repository=example/hello --set image.tag=dev

  plan:
    desc: Plan all infra units (cost-free)
    dir: infra
    dotenv: ['../.env']
    cmds: [terragrunt run --all plan]

  up:
    desc: Provision infra — VPC, Autopilot cluster, registry, CI identity, the delegated public DNS zone, and IAP access (creates cloud resources)
    dir: infra
    dotenv: ['../.env']
    cmds: [terragrunt run --all apply --non-interactive]

  build:
    desc: Build the Go app image locally (linux/amd64 to match GKE nodes)
    cmds:
      - docker build --platform linux/amd64 -t {{.IMAGE_NAME}}:dev {{.APP_DIR}}

  push:
    desc: Tag the local hello:dev image for Artifact Registry and push it (mirrors CI)
    deps: [build]
    dotenv: ['.env']
    cmds:
      - |
        : "${GCP_PROJECT:?set GCP_PROJECT=<project id>}"
        : "${GCP_REGION:?set GCP_REGION=<region>}"
        REGISTRY="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT/{{.REPO}}"
        gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet
        docker tag {{.IMAGE_NAME}}:dev "$REGISTRY/{{.IMAGE_NAME}}:dev"
        docker push "$REGISTRY/{{.IMAGE_NAME}}:dev"
        echo "Pushed $REGISTRY/{{.IMAGE_NAME}}:dev"

  creds:
    desc: Fetch kube-context for the cluster
    dotenv: ['.env']
    cmds:
      - gcloud container clusters get-credentials {{.CLUSTER}} --region "$GCP_REGION"

  deploy:
    desc: Deploy the chart to the current kube-context with Helm (requires an image already pushed)
    dotenv: ['.env']
    vars:
      TAG: '{{.TAG | default "dev"}}'
    cmds:
      - |
        : "${GCP_PROJECT:?set GCP_PROJECT=<project id>}"
        : "${GCP_REGION:?set GCP_REGION=<region>}"
        : "${INGRESS_DOMAIN:?set INGRESS_DOMAIN=<the public hostname>}"
        REGISTRY="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT/{{.REPO}}"
        helm upgrade --install {{.RELEASE}} {{.CHART_DIR}} \
          --namespace {{.NAMESPACE}} --create-namespace \
          --set image.repository="$REGISTRY/{{.IMAGE_NAME}}" \
          --set image.tag="{{.TAG}}" \
          --set domain="$INGRESS_DOMAIN" \
          --wait --timeout 3m

  dns:
    desc: Publish the apex A record by reading the deployed Ingress IP, then re-applying the dns unit (phase 2)
    dotenv: ['.env']
    cmds:
      - |
        : "${INGRESS_DOMAIN:?set INGRESS_DOMAIN=<the public hostname>}"
        echo "Waiting for the Ingress to be assigned a load-balancer IP..."
        for i in $(seq 1 60); do
          IP=$(kubectl -n {{.NAMESPACE}} get ingress {{.RELEASE}}-{{.IMAGE_NAME}} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          [ -n "$IP" ] && break
          sleep 10
        done
        : "${IP:?the Ingress never reported a load-balancer IP — is it deployed? (task gke-iap:deploy)}"
        echo "Ingress IP: $IP — publishing apex A record for $INGRESS_DOMAIN"
        (cd infra/dns && INGRESS_IP="$IP" terragrunt apply --non-interactive)

  verify:
    desc: Wait for the managed cert + DNS, then run the IAP negative + positive connectivity tests
    dotenv: ['.env']
    cmds:
      - |
        : "${INGRESS_DOMAIN:?set INGRESS_DOMAIN=<the public hostname>}"
        echo "Waiting for the ManagedCertificate to become Active (can take 10-20m on first issue)..."
        for i in $(seq 1 120); do
          STATUS=$(kubectl -n {{.NAMESPACE}} get managedcertificate {{.RELEASE}}-{{.IMAGE_NAME}} \
            -o jsonpath='{.status.certificateStatus}' 2>/dev/null || true)
          echo "  cert status: ${STATUS:-<pending>}"
          [ "$STATUS" = "Active" ] && break
          sleep 15
        done
      - task: verify-negative
      - task: verify-positive

  verify-negative:
    desc: "IAP negative test: an UNAUTHENTICATED request must NOT reach the app (IAP redirects to Google sign-in)"
    dotenv: ['.env']
    cmds:
      - |
        : "${INGRESS_DOMAIN:?set INGRESS_DOMAIN=<the public hostname>}"
        URL="https://$INGRESS_DOMAIN/"
        echo "Negative test: GET $URL with no credentials (expecting an IAP auth redirect, not the app)..."
        for i in $(seq 1 30); do
          # IAP responds to unauthenticated requests with a 302 to accounts.google.com. Capture the
          # status + Location without following redirects.
          OUT=$(curl -sS -o /dev/null -D - --max-time 10 "$URL" 2>/dev/null || true)
          CODE=$(printf '%s' "$OUT" | awk 'NR==1{print $2}')
          LOC=$(printf '%s' "$OUT" | tr -d '\r' | awk -F': ' 'tolower($1)=="location"{print $2}')
          if [ -n "$CODE" ]; then
            echo "  HTTP $CODE; Location: ${LOC:-<none>}"
            case "$LOC" in
              *accounts.google.com*)
                echo "OK: IAP redirected the unauthenticated request to Google sign-in — the gate is enforced."
                exit 0;;
            esac
            case "$CODE" in
              401|403)
                echo "OK: IAP rejected the unauthenticated request (HTTP $CODE) — the gate is enforced."
                exit 0;;
              200)
                echo "FAILED: the app served an UNAUTHENTICATED request (HTTP 200) — IAP is NOT enforcing!" >&2
                exit 1;;
            esac
          fi
          echo "  endpoint not ready yet (attempt $i); retrying..."
          sleep 10
        done
        echo "FAILED: could not get a conclusive response from $URL" >&2
        exit 1

  verify-positive:
    desc: "IAP positive test: a request with a service-account-signed JWT (aud = resource URL) reaches the app"
    dotenv: ['.env']
    cmds:
      - |
        : "${INGRESS_DOMAIN:?set INGRESS_DOMAIN=<the public hostname>}"
        URL="https://$INGRESS_DOMAIN/"
        # The test service account created by infra/iap-sa. The operator (IAP_MEMBER) holds Token
        # Creator on it, so we can sign a JWT as this SA without an exported key.
        SA=$(cd infra/iap-sa && terragrunt output -raw email)
        : "${SA:?could not read the test service account email — did 'task gke-iap:up' run?}"
        echo "Positive test: signing an IAP JWT as $SA (audience=$URL)..."
        NOW=$(date +%s)
        cat > /tmp/iap-claim.json <<EOF
        { "iss": "$SA", "sub": "$SA", "aud": "$URL", "iat": $NOW, "exp": $((NOW + 3600)) }
        EOF
        # Sign the JWT via the IAM Credentials API (no key material touches disk).
        gcloud iam service-accounts sign-jwt --iam-account="$SA" /tmp/iap-claim.json /tmp/iap.jwt
        JWT=$(cat /tmp/iap.jwt)
        rm -f /tmp/iap-claim.json /tmp/iap.jwt
        echo "Probing $URL with the signed JWT..."
        for i in $(seq 1 30); do
          if curl -fsS --max-time 10 -H "Authorization: Bearer $JWT" "$URL"; then
            echo "OK: reached the app through IAP with a service-account JWT."
            exit 0
          fi
          echo "  not ready yet (attempt $i); retrying..."
          sleep 10
        done
        echo "FAILED: could not reach $URL with the service-account JWT." >&2
        echo "Check that the SA has roles/iap.httpsResourceAccessor (infra/iap-access) and that the" >&2
        echo "managed cert is Active + DNS resolves." >&2
        exit 1

  all:
    desc: After `up`, run the full app path — build is done in CI; locally chains deploy -> dns -> verify
    cmds:
      - task: deploy
      - task: dns
      - task: verify

  ci-config:
    desc: Print the WIF provider name to set as a GitHub Actions variable
    dir: infra
    dotenv: ['../.env']
    cmds:
      - |
        echo "Set this as a GitHub Actions repository variable:"
        echo -n "WIF_PROVIDER="; (cd deployer-wif && terragrunt output -json provider_names | jq -r '.github')

  test:
    desc: Run the Go app tests; validate + plan as a cheap infra smoke test
    cmds:
      - task: test-app
      - task: validate

  test-app:
    internal: true
    dir: app/go
    cmds: [go test ./...]

  down:
    desc: Destroy all infra (delete the Helm release first so the LB/Ingress is removed cleanly)
    dotenv: ['.env']
    cmds:
      - helm uninstall {{.RELEASE}} --namespace {{.NAMESPACE}} --ignore-not-found --wait || true
      - cd infra && terragrunt run --all destroy --non-interactive
