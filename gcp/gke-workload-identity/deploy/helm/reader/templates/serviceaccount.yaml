# The Kubernetes service account the Job runs as. With direct Workload Identity Federation the KSA
# is itself the IAM principal — no iam.gke.io/gcp-service-account annotation. The IAM grant to this
# KSA principal lives in Terraform (infra/workload-identity), so its name/namespace must match.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "reader.labels" . | nindent 4 }}
