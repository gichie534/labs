# Build the Go "hello world" image, push it to Artifact Registry, and deploy it to the GKE
# Autopilot cluster with Helm — all keyless via Workload Identity Federation (no SA JSON key).
#
# Required repository variables (Settings > Secrets and variables > Actions > Variables):
#   GCP_PROJECT             e.g. my-project
#   GCP_REGION              e.g. us-central1
#   GKE_CLUSTER             gke-autopilot-helm
#   ARTIFACT_REPO           gke-autopilot-helm
#   WIF_PROVIDER            full provider resource name from `task gke-helm:ci-config`
#                           (projects/<num>/locations/global/workloadIdentityPools/github-ci/providers/github)
#
# Auth is DIRECT Workload Identity Federation — CI acts as the federated principal itself, with no
# service account to impersonate and no JSON key.
#
# This workflow lives inside the lab folder. To run it from the repo root, either move/symlink it
# to the repository's top-level .github/workflows/ or trigger it manually.

name: deploy-gke-autopilot-helm

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "gcp/gke-autopilot-helm/app/go/**"
      - "gcp/gke-autopilot-helm/deploy/helm/**"
      - "gcp/gke-autopilot-helm/.github/workflows/deploy.yml"

permissions:
  contents: read
  id-token: write # required for GitHub to mint the OIDC token used by WIF

env:
  APP_DIR: gcp/gke-autopilot-helm/app/go
  CHART_DIR: gcp/gke-autopilot-helm/deploy/helm/hello
  IMAGE_NAME: hello

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (keyless, direct WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/${{ vars.ARTIFACT_REPO }}
        run: |
          IMAGE="$REGISTRY/$IMAGE_NAME:${GITHUB_SHA::12}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker build -t "$IMAGE" "$APP_DIR"
          docker push "$IMAGE"

      - name: Get cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GCP_REGION }}

      - name: Deploy with Helm
        env:
          REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/${{ vars.ARTIFACT_REPO }}
        run: |
          helm upgrade --install hello "$CHART_DIR" \
            --namespace hello --create-namespace \
            --set image.repository="$REGISTRY/$IMAGE_NAME" \
            --set image.tag="${GITHUB_SHA::12}" \
            --atomic \
            --wait --timeout 10m
